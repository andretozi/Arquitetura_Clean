<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - Literalar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; color: #2d3748; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;}
        .success-box { background: #fff; padding: 50px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(11, 128, 107, 0.1); max-width: 500px;}
        .icon { font-size: 5rem; margin-bottom: 20px; }
        h1 { color: #0b806b; font-size: 2.2rem; margin-bottom: 10px; }
        p { color: #4a5568; font-size: 1.1rem; margin-bottom: 30px; line-height: 1.5;}
        .btn-home { background-color: #1a202c; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: 700; transition: background 0.2s; }
        .btn-home:hover { background-color: #2d3748; }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="icon">🎉</div>
        <h1>Compra Confirmada!</h1>
        <p>A sua compra usando <strong>{{ metodo }}</strong> foi aprovada com sucesso. Seu carrinho já foi esvaziado.</p>
        <a href="/" class="btn-home">Voltar ao Catálogo</a>
    </div>
</body>
</html>
